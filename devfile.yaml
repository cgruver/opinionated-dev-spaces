schemaVersion: 2.3.0
metadata:
  name: opinionated-dev-spaces
parent:
  uri: https://raw.githubusercontent.com/cgruver/opinionated-dev-spaces/refs/heads/main/parent-devfiles/inject-oc-cli.yaml
components:
- name: dev-tools
  container:
    image: nexus.clg.lab:5002/dev-spaces/workspace-base:test
    # image: quay.io/cgruver0/che/workspace-base:latest
    memoryLimit: 6Gi
    memoryRequest: 1Gi
    cpuLimit: "4"
    cpuRequest: 100m
    mountSources: true
    env:
    - name: SHELL
      value: "/bin/zsh"
    - name: VSCODE_DEFAULT_WORKSPACE
      value: "/projects/opinionated-dev-spaces/vscode.code-workspace"
- volume:
    size: 50Gi
  name: projects
