schemaVersion: 2.3.0
metadata:
  name: opinionated-dev-spaces
components:
- name: dev-tools
  container:
    image: nexus.clg.lab:5002/dev-spaces/workspace-base:test
    # image: quay.io/cgruver0/che/workspace-base:latest
    memoryLimit: 6Gi
    memoryRequest: 1Gi
    cpuLimit: "4"
    cpuRequest: 100m
    mountSources: true
    env:
    - name: SHELL
      value: "/bin/zsh"
    - name: VSCODE_DEFAULT_WORKSPACE
      value: "/projects/opinionated-dev-spaces/vscode.code-workspace"
- volume:
    size: 50Gi
  name: projects
- name: prep-workspace
  container:
    args:
      - '-c'
      - >-
        mkdir -p /projects/.bin && cp /usr/bin/oc /projects/.bin/oc && cp /usr/bin/kubectl /projects/.bin/kubectl && if [[ -f ${HOME}/.kube/config ]]; then rm ${HOME}/.kube/config; fi
    command:
      - /bin/bash
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    mountSources: true
    sourceMapping: /projects
    memoryRequest: 128Mi
    memoryLimit: 256Mi
    cpuRequest: 10m
    cpuLimit: 200m
    env:
    - name: HOME
      value: "/projects"
commands:
- apply:
    component: prep-workspace
    label: Pre Start Prep
  id: prep-workspace
events:
  preStart:
    - prep-workspace
